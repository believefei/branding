<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Octopus Poster Study</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="stage">
        <canvas id="poster" width="720" height="720" aria-label="Octopus poster canvas"></canvas>

          <div><span>Source</span><strong>shanghai_24h.csv</strong></div>

    </main>

    <script src="./app.js"></script>
